<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXUS-ULTRA 2050 • Global AI Intelligence</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    /* ChatGPT's Futuristic CSS Integrated & Optimized */
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@300;400;500&family=JetBrains+Mono&display=swap');

    :root {
        --bg-dark: #0a0b10;
        --bg-purple: #1a0b2e;
        --glass-bg: rgba(255, 255, 255, 0.05);
        --glass-border: rgba(255, 255, 255, 0.12);
        --neon-blue: #00eaff;
        --neon-purple: #a855ff;
        --led-green: #00ff9c;
        --led-red: #ff3b3b;
        --led-blue: #2f7cff;
        --accent: #00eaff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        font-family: 'Inter', sans-serif;
        color: white;
        min-height: 100vh;
        background: linear-gradient(135deg, var(--bg-dark), var(--bg-purple));
        background-size: 400% 400%;
        animation: meshMove 15s ease infinite;
        display: flex;
        justify-content: center;
        padding: 20px;
        overflow-x: hidden;
    }

    @keyframes meshMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

    /* Main Container Structure */
    .app-container {
        display: grid;
        grid-template-columns: 80px 1fr 300px;
        gap: 20px;
        max-width: 1400px;
        width: 100%;
        margin-top: 20px;
    }

    /* Glass Panels */
    .glass {
        background: var(--glass-bg);
        backdrop-filter: blur(30px);
        -webkit-backdrop-filter: blur(30px);
        border: 1px solid var(--glass-border);
        border-radius: 22px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }

    /* Left Sidebar (Apple Style) */
    .sidebar {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 25px 0;
        gap: 25px;
        height: fit-content;
    }

    .nav-btn {
        width: 50px;
        height: 50px;
        border-radius: 15px;
        background: transparent;
        color: rgba(255,255,255,0.5);
        border: none;
        cursor: pointer;
        transition: 0.3s;
        font-size: 1.2rem;
    }

    .nav-btn:hover, .nav-btn.active {
        color: var(--neon-blue);
        background: rgba(255,255,255,0.05);
        box-shadow: 0 0 15px var(--neon-blue);
    }

    /* Center Workspace */
    .main-workspace {
        padding: 25px;
        display: flex;
        flex-direction: column;
        gap: 20px;
    }

    header {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    h1 { font-family: 'Orbitron'; font-size: 1.4rem; color: var(--neon-blue); text-shadow: 0 0 10px rgba(0,234,255,0.3); }

    .status-panel {
        display: flex;
        align-items: center;
        gap: 10px;
        background: rgba(0,0,0,0.2);
        padding: 6px 15px;
        border-radius: 50px;
        border: 1px solid var(--glass-border);
    }

    .led-indicator { width: 10px; height: 10px; border-radius: 50%; background: var(--led-blue); transition: 0.3s; }

    /* Input Hub */
    .search-box { position: relative; }
    #searchInput {
        width: 100%;
        background: rgba(0,0,0,0.3);
        border: 1px solid var(--glass-border);
        padding: 12px 15px 12px 40px;
        border-radius: 12px;
        color: white;
        outline: none;
        font-size: 0.9rem;
    }
    .search-box i { position: absolute; left: 15px; top: 15px; color: var(--neon-blue); opacity: 0.6; }

    #mainInput {
        width: 100%;
        height: 220px;
        background: rgba(0,0,0,0.3);
        border: 1px solid var(--glass-border);
        border-radius: 15px;
        padding: 20px;
        color: white;
        font-family: 'JetBrains Mono', monospace;
        font-size: 14px;
        resize: none;
        outline: none;
        transition: 0.3s;
    }
    #mainInput:focus { border-color: var(--neon-blue); box-shadow: 0 0 15px rgba(0,234,255,0.1); }

    /* Action Grid */
    .action-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }

    .btn {
        padding: 15px;
        border-radius: 12px;
        border: none;
        cursor: pointer;
        color: white;
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        font-size: 0.8rem;
        font-weight: 600;
        transition: 0.2s;
    }

    .btn:hover {
        background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
        transform: translateY(-3px);
        box-shadow: 0 5px 20px rgba(0,234,255,0.3);
    }
    .btn:active { transform: scale(0.95); }

    /* Memory History */
    .history-vault { margin-top: 10px; }
    #historyList { display: flex; flex-direction: column; gap: 10px; max-height: 200px; overflow-y: auto; padding-right: 5px; }

    .history-card {
        padding: 12px 18px;
        background: rgba(255,255,255,0.03);
        border-radius: 12px;
        border: 1px solid var(--glass-border);
        display: flex;
        justify-content: space-between;
        align-items: center;
        cursor: pointer;
        transition: 0.3s;
        font-size: 0.85rem;
    }
    .history-card:hover { border-color: var(--neon-blue); transform: translateX(5px); background: rgba(0,234,255,0.05); }

    /* Insights Side */
    .insights { padding: 20px; }
    .insight-item {
        background: rgba(0,0,0,0.2);
        padding: 12px;
        border-radius: 12px;
        font-size: 0.75rem;
        margin-bottom: 10px;
        border-left: 3px solid var(--neon-blue);
    }
    #liveClock { text-align: center; margin-top: 20px; font-family: 'Orbitron'; color: var(--neon-blue); font-size: 1rem; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }
  </style>
</head>
<body>

  <div class="app-container">
    <aside class="sidebar glass">
      <button class="nav-btn active"><i class="fas fa-brain"></i></button>
      <button class="nav-btn"><i class="fas fa-cloud"></i></button>
      <button class="nav-btn"><i class="fas fa-shield-halved"></i></button>
      <button class="nav-btn" id="lockBtn"><i class="fas fa-unlock"></i></button>
    </aside>

    <main class="main-workspace glass">
      <header>
        <h1>NEXUS-ULTRA <span style="font-size: 0.6rem; vertical-align: middle; background: var(--neon-blue); color: black; padding: 2px 6px; border-radius: 4px;">PRO</span></h1>
        <div class="status-panel">
          <div class="led-indicator" id="statusLed"></div>
          <span id="statusText" style="font-size: 0.7rem; font-weight: 700; letter-spacing: 1px;">SYNCING</span>
        </div>
      </header>

      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search neural history logs...">
      </div>

      <textarea id="mainInput" placeholder="Neural Matrix Active. Input detected..."></textarea>

      <div class="action-grid">
        <button class="btn" id="copyBtn"><i class="fas fa-bolt"></i> COPY</button>
        <button class="btn" id="downloadBtn"><i class="fas fa-file-export"></i> EXPORT</button>
        <button class="btn" id="micBtn"><i class="fas fa-microphone"></i> VOICE</button>
        <button class="btn" id="clearBtn" style="border-color: rgba(255,59,59,0.3);"><i class="fas fa-radiation"></i> WIPE</button>
      </div>

      <div class="history-vault">
        <h3 style="font-size: 0.8rem; margin-bottom: 12px; color: var(--neon-blue);"><i class="fas fa-database"></i> QUANTUM MEMORY</h3>
        <div id="historyList"></div>
        <div id="emptyMsg" style="text-align: center; font-size: 0.7rem; color: #555; margin-top: 10px;">Memory Empty</div>
      </div>
    </main>

    <aside class="insights glass">
      <h3 style="font-size: 0.8rem; font-family: 'Orbitron'; margin-bottom: 20px;">AI METRICS</h3>
      <div class="insight-item">Engine: Nexus v4.0</div>
      <div class="insight-item">Security: AES-512</div>
      <div class="insight-item">Neural Sync: Active</div>
      <div class="insight-item" id="tokenCount">Tokens: 0</div>
      <div id="liveClock">00:00:00</div>
    </aside>
  </div>

  <script>
    const els = {
      input: document.getElementById('mainInput'),
      list: document.getElementById('historyList'),
      led: document.getElementById('statusLed'),
      status: document.getElementById('statusText'),
      search: document.getElementById('searchInput'),
      tokens: document.getElementById('tokenCount')
    };

    let isLocked = false;

    // Initialize
    window.onload = () => {
      const data = JSON.parse(localStorage.getItem('nexus_v2')) || [];
      renderHistory(data);
      setInterval(updateClock, 1000);
      updateClock();
    };

    // Copy & Save
    document.getElementById('copyBtn').onclick = async () => {
      if(isLocked) return alert("System Locked!");
      const val = els.input.value.trim();
      if(!val) return setStatus('ERROR', '#ff3b3b');

      await navigator.clipboard.writeText(val);
      setStatus('COPIED', '#00ff9c');
      saveMemory(val);
    };

    function saveMemory(txt) {
      let memory = JSON.parse(localStorage.getItem('nexus_v2')) || [];
      memory = [txt, ...memory.filter(i => i !== txt)].slice(0, 10);
      localStorage.setItem('nexus_v2', JSON.stringify(memory));
      renderHistory(memory);
    }

    function renderHistory(items) {
      els.list.innerHTML = items.map(item => `
        <div class="history-card" onclick="restore('${item.replace(/'/g, "\\'")}')">
          <span>${item.substring(0, 35)}...</span>
          <i class="fas fa-redo-alt redo-icon" style="color:var(--neon-blue); font-size:10px;"></i>
        </div>
      `).join('');
      document.getElementById('emptyMsg').style.display = items.length ? 'none' : 'block';
    }

    function restore(txt) {
      if(isLocked) return;
      els.input.value = txt;
      setStatus('RESTORED', '#2f7cff');
      updateTokens();
    }

    // Voice Engine
    document.getElementById('micBtn').onclick = () => {
      const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
      if(!Speech) return alert("Browser not supported!");
      const rec = new Speech();
      rec.onstart = () => setStatus('LISTENING', '#a855ff');
      rec.onresult = (e) => {
        els.input.value += " " + e.results[0][0].transcript;
        updateTokens();
        setStatus('SYNCING', '#2f7cff');
      };
      rec.start();
    };

    // Lock System
    document.getElementById('lockBtn').onclick = function() {
      isLocked = !isLocked;
      els.input.disabled = isLocked;
      this.innerHTML = isLocked ? '<i class="fas fa-lock"></i>' : '<i class="fas fa-unlock"></i>';
      this.classList.toggle('active', isLocked);
      setStatus(isLocked ? 'LOCKED' : 'SYNCING', isLocked ? '#ff3b3b' : '#2f7cff');
    };

    // Utils
    document.getElementById('clearBtn').onclick = () => {
      if(confirm("Wipe all neural data?")) {
        localStorage.removeItem('nexus_v2');
        renderHistory([]);
        els.input.value = '';
        updateTokens();
      }
    };

    document.getElementById('downloadBtn').onclick = () => {
      const blob = new Blob([els.input.value], {type:'text/plain'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'Nexus_Export.txt';
      a.click();
    };

    function setStatus(msg, col) {
      els.status.innerText = msg;
      els.led.style.background = col;
      els.led.style.boxShadow = `0 0 10px ${col}`;
      setTimeout(() => {
        els.status.innerText = 'SYNCING';
        els.led.style.background = '#2f7cff';
      }, 2000);
    }

    function updateClock() {
      document.getElementById('liveClock').innerText = new Date().toLocaleTimeString();
    }

    function updateTokens() {
        els.tokens.innerText = `Tokens: ${Math.ceil(els.input.value.length / 4)}`;
    }

    els.input.oninput = updateTokens;

    els.search.oninput = (e) => {
      const term = e.target.value.toLowerCase();
      document.querySelectorAll('.history-card').forEach(card => {
        card.style.display = card.innerText.toLowerCase().includes(term) ? 'flex' : 'none';
      });
    };
  </script>
</body>
</html>
