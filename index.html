<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Clone - Working UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #131314; color: #e3e3e3; font-family: 'Google Sans', sans-serif; overflow: hidden; }
        .sidebar { transition: width 0.3s; width: 68px; background-color: #1e1f20; }
        .sidebar.expanded { width: 280px; }
        .input-container { background-color: #1e1f20; border-radius: 28px; transition: 0.2s; }
        .input-container:focus-within { background-color: #28292a; }
        textarea { resize: none; max-height: 200px; }
        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen">

    <aside id="sidebar" class="sidebar flex flex-col justify-between py-4 px-3 h-full hidden md:flex">
        <div>
            <button onclick="toggleSidebar()" class="p-3 hover:bg-gray-700 rounded-full mb-8">
                <i class="fa-solid fa-bars text-xl"></i>
            </button>
            <button class="flex items-center p-3 hover:bg-gray-700 rounded-full text-gray-400 gap-4">
                <i class="fa-solid fa-plus text-xl"></i>
                <span class="hidden sidebar-text font-medium">New Chat</span>
            </button>
        </div>
        <div class="flex flex-col gap-2">
            <div class="flex items-center p-3 hover:bg-gray-700 rounded-full gap-4">
                <i class="fa-solid fa-circle-question text-xl"></i>
                <span class="hidden sidebar-text">Help</span>
            </div>
            <div class="flex items-center p-3 hover:bg-gray-700 rounded-full gap-4">
                <i class="fa-solid fa-clock-rotate-left text-xl"></i>
                <span class="hidden sidebar-text">Activity</span>
            </div>
            <div class="flex items-center p-3 hover:bg-gray-700 rounded-full gap-4">
                <i class="fa-solid fa-gear text-xl"></i>
                <span class="hidden sidebar-text">Settings</span>
            </div>
        </div>
    </aside>

    <div class="flex-grow flex flex-col relative overflow-hidden">
        
        <header class="flex justify-between items-center p-4">
            <div class="flex items-center gap-2">
                <span class="text-xl font-semibold">Gemini <i class="fa-solid fa-caret-down text-sm text-gray-400"></i></span>
            </div>
            <div class="flex items-center gap-4">
                <button class="bg-[#28292a] px-4 py-2 rounded-lg text-sm font-medium hover:bg-gray-700">Try Gemini Advanced</button>
                <img src="https://via.placeholder.com/32" class="w-8 h-8 rounded-full border border-gray-600" alt="Profile">
            </div>
        </header>

        <div id="chat-window" class="flex-grow overflow-y-auto px-4 md:px-20 py-10 flex flex-col gap-8">
            <div id="greeting" class="mt-10">
                <h2 class="text-4xl font-medium text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-red-400 to-orange-400">Hi Gurshak</h2>
                <h1 class="text-5xl font-semibold text-gray-500 mt-2">Where should we start?</h1>
            </div>
        </div>

        <div class="p-4 md:px-20 pb-8">
            <div class="input-container p-3 flex flex-col">
                <textarea id="userInput" rows="1" placeholder="Enter a prompt here" 
                    class="bg-transparent border-none outline-none w-full px-2 text-lg"
                    oninput="autoGrow(this)"></textarea>
                
                <div class="flex justify-between items-center mt-3 px-2">
                    <div class="flex gap-4 text-gray-400 items-center">
                        <label class="cursor-pointer hover:text-white"><i class="fa-solid fa-plus-circle text-xl"></i><input type="file" hidden></label>
                        <i class="fa-regular fa-image text-xl cursor-pointer hover:text-white"></i>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="bg-[#333537] px-2 py-0.5 rounded-md text-[10px] font-bold text-gray-300">Fast</div>
                        <i class="fa-solid fa-microphone text-xl text-gray-400 cursor-pointer hover:text-white"></i>
                        <button id="sendBtn" onclick="sendMessage()" class="hidden"><i class="fa-solid fa-paper-plane text-xl text-blue-400"></i></button>
                    </div>
                </div>
            </div>
            <p class="text-center text-[11px] text-gray-500 mt-3">Gemini may display inaccurate info, including about people, so double-check its responses.</p>
        </div>
    </div>

    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const texts = document.querySelectorAll('.sidebar-text');
            sidebar.classList.toggle('expanded');
            texts.forEach(t => t.classList.toggle('hidden'));
        }

        function autoGrow(element) {
            element.style.height = "5px";
            element.style.height = (element.scrollHeight) + "px";
            
            const sendBtn = document.getElementById('sendBtn');
            if(element.value.trim().length > 0) {
                sendBtn.classList.remove('hidden');
            } else {
                sendBtn.classList.add('hidden');
            }
        }

        function sendMessage() {
            const input = document.getElementById('userInput');
            const chatWindow = document.getElementById('chat-window');
            const greeting = document.getElementById('greeting');

            if(input.value.trim() === "") return;

            // Hide greeting on first message
            if(greeting) greeting.style.display = 'none';

            // Append User Message
            const userMsg = `<div class="flex justify-end"><div class="bg-[#28292a] p-4 rounded-2xl max-w-[80%]">${input.value}</div></div>`;
            chatWindow.innerHTML += userMsg;

            // Clear Input
            input.value = "";
            input.style.height = "auto";
            document.getElementById('sendBtn').classList.add('hidden');

            // Scroll to bottom
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }
    </script>
</body>
</html>
