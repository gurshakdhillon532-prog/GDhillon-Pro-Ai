<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Hub - Premium Clipboard Manager</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #121212;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
            --accent-neon: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --accent-glow: rgba(102, 126, 234, 0.5);
            --success: #10b981;
            --danger: #ef4444;
        }

        [data-theme="light"] {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(0, 0, 0, 0.05);
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --accent-glow: rgba(102, 126, 234, 0.3);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
        }

        .header h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 700;
            background: var(--accent-neon);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
            text-shadow: 0 0 30px var(--accent-glow);
        }

        .header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            font-weight: 300;
        }

        /* Navigation Bar */
        .nav-bar {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .nav-item {
            padding: 12px 24px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 500;
            position: relative;
            overflow: hidden;
        }

        .nav-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--accent-neon);
            opacity: 0.2;
            transition: left 0.5s;
        }

        .nav-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border-color: transparent;
        }

        .nav-item:hover::before {
            left: 0;
        }

        .nav-item.active {
            background: var(--accent-neon);
            color: white;
            box-shadow: 0 0 30px var(--accent-glow);
        }

        /* Clipboard Cards */
        .clipboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .clipboard-card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 28px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .clipboard-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--accent-neon);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .clipboard-card:hover {
            transform: translateY(-12px) scale(1.02);
            box-shadow: 0 32px 60px rgba(0, 0, 0, 0.4);
            border-color: rgba(102, 126, 234, 0.3);
        }

        .clipboard-card:hover::before {
            transform: scaleX(1);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .card-icon {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            background: var(--accent-neon);
            box-shadow: 0 8px 24px var(--accent-glow);
        }

        .card-time {
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 500;
        }

        .card-content {
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 20px;
            word-break: break-word;
            min-height: 60px;
        }

        .card-actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-copy {
            background: rgba(102, 126, 234, 0.2);
            color: var(--text-primary);
            border: 1px solid var(--accent-glow);
        }

        .btn-copy:hover {
            background: var(--accent-neon);
            color: white;
            transform: scale(1.05);
            box-shadow: 0 8px 24px var(--accent-glow);
        }

        .btn-delete {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .btn-delete:hover {
            background: var(--danger);
            color: white;
            transform: scale(1.05);
        }

        /* Floating Action Button */
        .fab {
            position: fixed;
            bottom: 32px;
            right: 32px;
            width: 68px;
            height: 68px;
            border-radius: 50%;
            background: var(--accent-neon);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            cursor: pointer;
            box-shadow: 0 20px 40px var(--accent-glow);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            backdrop-filter: blur(20px);
        }

        .fab:hover {
            transform: scale(1.1) rotate(90deg);
            box-shadow: 0 25px 50px var(--accent-glow);
        }

        /* Settings Panel */
        .settings-panel {
            position: fixed;
            top: 0;
            right: -400px;
            width: 400px;
            height: 100vh;
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            border-left: 1px solid var(--glass-border);
            transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 999;
            padding: 40px 32px;
        }

        .settings-panel.open {
            right: 0;
        }

        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .settings-toggle {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-primary);
            padding: 8px;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .settings-toggle:hover {
            background: var(--glass-bg);
            transform: rotate(90deg);
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid var(--glass-border);
        }

        .toggle-switch {
            position: relative;
            width: 60px;
            height: 32px;
            background: var(--glass-bg);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .toggle-switch.active {
            background: var(--accent-neon);
        }

        .toggle-knob {
            position: absolute;
            top: 3px;
            left: 3px;
            width: 26px;
            height: 26px;
            background: white;
            border-radius: 50%;
            transition: transform 0.3s ease;
        }

        .toggle-switch.active .toggle-knob {
            transform: translateX(28px);
        }

        /* Assistant Modal */
        .assistant-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1001;
        }

        .assistant-modal.active {
            display: flex;
        }

        .assistant-container {
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 48px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            text-align: center;
        }

        .voice-btn {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: var(--accent-neon);
            border: none;
            font-size: 2.5rem;
            margin: 24px auto;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 20px 40px var(--accent-glow);
        }

        .voice-btn.listening {
            background: var(--success);
            transform: scale(1.1);
            box-shadow: 0 0 50px var(--success);
        }

        .voice-status {
            font-size: 1.1rem;
            margin: 20px 0;
            min-height: 24px;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 80px 40px;
            grid-column: 1 / -1;
        }

        .empty-icon {
            font-size: 6rem;
            background: var(--accent-neon);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 24px;
            opacity: 0.7;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 16px;
            }
            
            .clipboard-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            
            .clipboard-card {
                padding: 24px;
            }
            
            .settings-panel {
                width: 100%;
                right: -100%;
            }
            
            .fab {
                bottom: 20px;
                right: 20px;
                width: 60px;
                height: 60px;
            }
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .clipboard-card {
            animation: fadeInUp 0.6s ease forwards;
        }

        .clipboard-card:nth-child(1) { animation-delay: 0.1s; }
        .clipboard-card:nth-child(2) { animation-delay: 0.2s; }
        .clipboard-card:nth-child(3) { animation-delay: 0.3s; }
    </style>
</head>
<body data-theme="dark">
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>Welcome to AI Hub</h1>
            <p>Your premium clipboard manager & intelligent assistant</p>
        </div>

        <div class="nav-bar">

            <div class="nav-item" data-tab="settings" id="settingsBtn">⚙️ Settings</div>
        </div>

        <!-- Clipboard Content -->
        <div class="clipboard-grid" id="clipboardGrid">
            <div class="empty-state">
                <div class="empty-icon">📋</div>
                <h3>Clipboard is empty</h3>
                <p>Copy something to see it appear here instantly</p>
            </div>
        </div>
    </div>

    <!-- Floating Action Button -->
    <button class="fab" id="voiceBtn" title="AI Assistant">🎤</button>

    <!-- Settings Panel -->
    <div class="settings-panel" id="settingsPanel">
        <div class="settings-header">
            <h3>Settings</h3>
            <button class="settings-toggle" id="closeSettings">✕</button>
        </div>
        <div class="setting-item">
            <span>Dark Mode</span>
            <div class="toggle-switch" id="themeToggle">
                <div class="toggle-knob"></div>
            </div>
        </div>
        <div class="setting-item">
            <span>Clear History</span>
            <button class="btn btn-delete" id="clearHistory">Clear All</button>
        </div>
    </div>

    <!-- Assistant Modal -->
    <div class="assistant-modal" id="assistantModal">
        <div class="assistant-container">
            <h2>AI Assistant</h2>
            <p style="color: var(--text-secondary); margin-bottom: 32px;">Say "copy [text]" or "clear clipboard"</p>
            <button class="voice-btn" id="voiceControl">🎤</button>
            <div class="voice-status" id="voiceStatus"></div>
            <div id="voiceTranscript"></div>
        </div>
    </div>

    <script>
        class AIHub {
            constructor() {
                this.clipboardHistory = JSON.parse(localStorage.getItem('clipboardHistory')) || [];
                this.isListening = false;
                this.recognition = null;
                this.init();
            }

            init() {
                this.bindEvents();
                this.renderClipboard();
                this.initSpeechRecognition();
                this.loadTheme();
            }

            bindEvents() {
                // Navigation
                document.querySelectorAll('.nav-item').forEach(item => {
                    item.addEventListener('click', (e) => {
                        document.querySelector('.nav-item.active').classList.remove('active');
                        e.target.classList.add('active');
                    });
                });

                // Settings
                document.getElementById('settingsBtn').addEventListener('click', () => {
                    document.getElementById('settingsPanel').classList.add('open');
                });

                document.getElementById('closeSettings').addEventListener('click', () => {
                    document.getElementById('settingsPanel').classList.remove('open');
                });

                // Theme toggle
                document.getElementById('themeToggle').addEventListener('click', () => {
                    this.toggleTheme();
                });

                // Clear history
                document.getElementById('clearHistory').addEventListener('click', () => {
                    this.clearHistory();
                });

                // Voice button
                document.getElementById('voiceBtn').addEventListener('click', () => {
                    document.getElementById('assistantModal').classList.add('active');
                });

                // Global clipboard listener
                document.addEventListener('copy', (e) => {
                    setTimeout(() => this.handleClipboardChange(), 100);
                });

                // ESC key
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') {
                        document.getElementById('settingsPanel').classList.remove('open');
                        document.getElementById('assistantModal').classList.remove('active');
                    }
                });
            }

            async handleClipboardChange() {

                    const text = await navigator
